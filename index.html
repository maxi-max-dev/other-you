<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>另一个你 · 决策沙盘</title>
<style>
  :root{
    /* 复古暖色调色板 */
    --bg:#2b2018;
    --bg2:#332619;
    --panel:#3d2e1e;
    --panel2:#4a3826;
    --ink:#f4e6cf;
    --ink-dim:#c9b394;
    --ink-faint:#9a8467;
    --line:#5a4530;
    --accent:#e8a45c;
    --accent2:#f0c27b;
    --gold:#f2c14e;
    /* 事件类型色 */
    --opp:#7dc98a;   /* 机会=绿 */
    --set:#e0685f;   /* 挫折=红 */
    --acc:#f2ca52;   /* 意外=黄 */
    --piv:#b58ad6;   /* 转折=紫 */
    --shadow:0 6px 20px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -200px, #4a3826 0%, var(--bg) 60%),
      var(--bg);
    color:var(--ink);
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    font-size:14px;
    line-height:1.6;
    min-height:100vh;
    padding-bottom:120px; /* 给底部固定条留空间 */
  }
  .wrap{max-width:1400px;margin:0 auto;padding:20px 24px}

  /* ---------- 头部 ---------- */
  header.head{
    border:1px solid var(--line);
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border-radius:14px;
    padding:20px 24px;
    box-shadow:var(--shadow);
  }
  .head-top{display:flex;flex-wrap:wrap;gap:12px 16px;align-items:baseline}
  .head h1{font-size:24px;margin:0;letter-spacing:.5px;color:var(--accent2)}
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:12px;padding:3px 10px;border-radius:999px;
    border:1px solid var(--line);background:var(--bg2);color:var(--ink-dim);
    white-space:nowrap;
  }
  .badge.tier-real{background:#2e4230;border-color:#4f7a54;color:#bfe6c4}
  .badge.tier-persona{background:#3a2e4a;border-color:#6a4f8a;color:#dcc9f0}
  .badge.tier-celebrity{background:#4a3826;border-color:var(--gold);color:var(--gold)}
  .badge.tag{background:#3a2c1a;border-color:#7a5a2e;color:var(--accent2)}
  .badge.tag-fic{background:#5a2e2e;border-color:#c76b4a;color:#ffd9c2;font-weight:600}
  .decision{
    margin:14px 0 4px;font-size:15px;color:var(--ink);
    background:var(--bg2);border-left:3px solid var(--accent);
    padding:10px 14px;border-radius:0 8px 8px 0;
  }
  .decision .lbl{color:var(--ink-faint);font-size:12px;margin-right:6px}
  .head-meta{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:10px;color:var(--ink-dim);font-size:12.5px}
  .head-meta b{color:var(--ink)}

  /* ---------- 线选择器 ---------- */
  .selector{
    margin:18px 0 6px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  }
  .selector .hint{color:var(--ink-faint);font-size:12px;margin-left:auto;font-style:italic}
  .chip{
    cursor:pointer;user-select:none;font-size:13px;
    padding:6px 12px;border-radius:999px;border:1px solid var(--line);
    background:var(--bg2);color:var(--ink-dim);
    display:inline-flex;align-items:center;gap:7px;transition:.15s;
  }
  .chip .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 1px rgba(0,0,0,.3)}
  .chip.on{background:var(--panel2);color:var(--ink);border-color:var(--accent)}
  .chip.off{opacity:.55}
  .chip.disabled{opacity:.3;cursor:not-allowed}
  .chip:hover{border-color:var(--accent2)}

  /* ---------- 世界网格 ---------- */
  .worlds{
    display:grid;gap:16px;margin-top:14px;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  }
  .worlds.n1{grid-template-columns:minmax(0,1fr)}
  .worlds.n2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .worlds.n3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .worlds.n4{grid-template-columns:repeat(2,minmax(0,1fr))}
  @media(min-width:1180px){.worlds.n4{grid-template-columns:repeat(4,minmax(0,1fr))}}
  @media(max-width:1000px){
    .worlds.n3,.worlds.n4{grid-template-columns:repeat(2,minmax(0,1fr))}
  }
  .world{
    border:1px solid var(--line);border-radius:12px;overflow:hidden;
    background:var(--panel);box-shadow:var(--shadow);display:flex;flex-direction:column;
  }
  .world-hd{padding:9px 12px;border-bottom:1px solid var(--line);background:var(--bg2)}
  .world-hd .choice{font-size:15px;font-weight:600;color:var(--accent2);display:flex;align-items:center;gap:8px}
  .world-hd .swatch{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
  .world-hd .sub{font-size:12px;color:var(--ink-faint);margin-top:2px}
  .hist-badge{
    font-size:10.5px;padding:1px 7px;border-radius:999px;
    background:#4a3826;border:1px solid var(--gold);color:var(--gold);margin-left:6px;
  }
  .canvas-box{position:relative;width:100%;background:#1c140d;line-height:0}
  canvas.world-canvas{
    width:100%;height:auto;display:block;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }
  /* 事件气泡浮层 */
  .bubble-layer{position:absolute;inset:0;pointer-events:none}
  .bubble{
    position:absolute;transform:translate(-50%,-100%);
    background:var(--ink);color:#2b2018;font-size:11px;font-weight:600;
    padding:4px 8px;border-radius:8px;white-space:nowrap;
    pointer-events:auto;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.5);
    animation:pop .3s ease-out;border:2px solid;
  }
  .bubble::after{
    content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--ink);
  }
  @keyframes pop{0%{transform:translate(-50%,-100%) scale(.4);opacity:0}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}

  /* ---------- 状态面板 ---------- */
  .stats{padding:10px 12px;border-top:1px solid var(--line);background:var(--panel)}
  .stat-row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .stat-row .ic{width:18px;text-align:center;font-size:13px}
  .stat-row .nm{width:38px;font-size:12px;color:var(--ink-dim)}
  .bar-track{flex:1;height:9px;background:var(--bg2);border-radius:5px;overflow:hidden;border:1px solid var(--line)}
  .bar-fill{display:block;height:100%;border-radius:5px;transition:width .35s cubic-bezier(.34,1.2,.5,1);width:0}
  .bar-e{background:linear-gradient(90deg,#e8a45c,#f2c14e)}
  .bar-m{background:linear-gradient(90deg,#7dc98a,#a8e6a0)}
  .bar-s{background:linear-gradient(90deg,#7fb2e8,#a7d4f0)}
  .bar-o{background:linear-gradient(90deg,#b58ad6,#d4b0f0)}
  .stat-row .val{width:30px;text-align:right;font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums}
  .stat-row .val.up{color:var(--opp)}
  .stat-row .val.down{color:var(--set)}

  /* ---------- 底部固定：时间轴 + 免责 ---------- */
  .footer-fixed{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:linear-gradient(180deg,rgba(43,32,24,.92),rgba(28,20,13,.98));
    border-top:1px solid var(--line);
    backdrop-filter:blur(6px);
    box-shadow:0 -6px 20px rgba(0,0,0,.4);
  }
  .timeline-bar{max-width:1400px;margin:0 auto;padding:12px 24px 8px}
  .tl-head{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
  .play-btn{
    cursor:pointer;border:1px solid var(--accent);background:var(--panel2);color:var(--accent2);
    width:40px;height:40px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:.15s;flex:0 0 auto;
  }
  .play-btn:hover{background:var(--accent);color:#2b2018}
  .tl-day{font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums}
  .tl-day b{color:var(--accent2);font-size:16px}
  .tl-date{color:var(--ink-faint);font-size:12.5px}
  .finale-btn{
    margin-left:auto;cursor:pointer;font-size:13px;padding:7px 16px;border-radius:999px;
    border:1px solid var(--gold);background:var(--bg2);color:var(--gold);transition:.15s;
  }
  .finale-btn:hover{background:var(--gold);color:#2b2018}
  .track-area{position:relative;padding:16px 0 4px}
  .scrubber{
    position:relative;height:8px;background:var(--bg2);border-radius:5px;border:1px solid var(--line);cursor:pointer;
  }
  .scrubber .progress{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:5px;width:0}
  .scrubber .handle{
    position:absolute;top:50%;width:18px;height:18px;border-radius:50%;
    background:var(--accent2);border:2px solid #2b2018;transform:translate(-50%,-50%);
    box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:grab;
  }
  .scrubber .handle:active{cursor:grabbing}
  /* 事件刻度点 */
  .tick{
    position:absolute;top:50%;width:9px;height:9px;border-radius:50%;
    transform:translate(-50%,-50%);border:1.5px solid #2b2018;cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .1s;
  }
  .tick:hover{transform:translate(-50%,-50%) scale(1.5);z-index:3}
  .disclaimer{
    max-width:1400px;margin:0 auto;padding:6px 24px 10px;
    text-align:center;font-size:12px;color:var(--ink-faint);
    border-top:1px dashed var(--line);
  }
  .disclaimer b{color:var(--ink-dim)}

  /* ---------- 模态：推演卡 ---------- */
  .overlay{
    position:fixed;inset:0;z-index:100;background:rgba(15,10,6,.72);
    display:flex;align-items:center;justify-content:center;padding:24px;
    animation:fade .2s;backdrop-filter:blur(3px);
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;
    max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);
    animation:rise .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes rise{from{transform:translateY(24px) scale(.96);opacity:0}to{transform:none;opacity:1}}
  .modal-hd{padding:18px 22px 12px;border-bottom:1px solid var(--line);position:relative}
  .modal-hd .type-tag{font-size:12px;padding:3px 10px;border-radius:999px;color:#2b2018;font-weight:700}
  .modal-hd h2{margin:10px 0 2px;font-size:20px;color:var(--ink)}
  .modal-hd .mdate{font-size:12.5px;color:var(--ink-faint)}
  .modal-close{
    position:absolute;right:16px;top:16px;cursor:pointer;font-size:18px;color:var(--ink-faint);
    width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)
  }
  .modal-close:hover{color:var(--ink);border-color:var(--ink-faint)}
  .modal-bd{padding:16px 22px 22px}
  .modal-bd .summary{font-size:15px;color:var(--ink);margin-bottom:16px}
  .block{margin-bottom:16px}
  .block .bt{font-size:13px;color:var(--accent2);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .block .bc{font-size:13.5px;color:var(--ink-dim);line-height:1.7}
  .reality{background:#2a3a2c;border:1px solid #4f7a54;border-radius:10px;padding:12px 14px}
  .reality .bt{color:#bfe6c4}
  .reality .bc{color:#d6ecd8}
  .effects{display:flex;flex-wrap:wrap;gap:8px}
  .eff{
    display:inline-flex;align-items:center;gap:5px;font-size:12.5px;
    padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg2);
  }
  .eff.pos{border-color:#4f7a54;color:var(--opp)}
  .eff.neg{border-color:#8a4a44;color:var(--set)}
  .eff .d{font-weight:700;font-variant-numeric:tabular-nums}

  /* ---------- 收尾层 ---------- */
  .finale-overlay .modal{max-width:920px}
  .finale-hd{text-align:center;padding:24px 22px 8px}
  .finale-hd h2{font-size:24px;color:var(--gold);margin:0 0 4px}
  .finale-hd p{color:var(--ink-faint);font-size:13px;margin:0}
  .finale-grid{
    display:grid;gap:14px;padding:16px 22px;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  }
  .fin-card{
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--bg2);
    border-top:4px solid var(--accent);
  }
  .fin-card h3{margin:0 0 10px;font-size:15px;color:var(--accent2);display:flex;align-items:center;gap:8px}
  .fin-seg{margin:8px 0}
  .fin-seg .st{font-size:11.5px;color:var(--ink-faint);margin-bottom:1px}
  .fin-seg .sc{font-size:13px;color:var(--ink-dim);line-height:1.6}
  .fin-seg.gave .st{color:var(--opp)}
  .fin-seg.took .st{color:var(--set)}
  .fin-seg.surprise .st{color:var(--acc)}
  .optionc-card{
    margin:8px 22px 24px;border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;
    background:
      radial-gradient(600px 200px at 80% -40px, rgba(242,193,78,.25), transparent),
      linear-gradient(135deg,#4a3826,#5a3e1e);
    border:1px solid var(--gold);
  }
  .optionc-card::before{
    content:"✦";position:absolute;right:18px;top:14px;font-size:26px;color:var(--gold);opacity:.5
  }
  .optionc-card .oc-eyebrow{font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .optionc-card h3{margin:6px 0 8px;font-size:19px;color:var(--accent2)}
  .optionc-card p{margin:0;font-size:14px;color:var(--ink);line-height:1.7}

  /* ---------- 错误占位 ---------- */
  .err-box{
    max-width:640px;margin:80px auto;padding:32px;text-align:center;
    border:1px solid var(--line);border-radius:16px;background:var(--panel);
  }
  .err-box .em{font-size:40px;margin-bottom:12px}
  .err-box h2{color:var(--accent2);margin:0 0 8px}
  .err-box p{color:var(--ink-dim);font-size:14px}
  .err-box code{background:var(--bg2);padding:2px 6px;border-radius:4px;color:var(--accent2)}

  /* ---------- 换个决定 按钮（沙盘左上） ---------- */
  .back-btn{
    display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;
    font-size:13px;padding:7px 14px;border-radius:999px;margin-bottom:16px;
    border:1px solid var(--line);background:var(--bg2);color:var(--ink-dim);transition:.15s;
  }
  .back-btn:hover{border-color:var(--accent2);color:var(--ink);background:var(--panel2)}
  .back-btn .home{font-size:15px}

  /* ---------- Landing 首页 ---------- */
  .landing{max-width:1080px;margin:0 auto;padding:8px 8px 40px}
  .land-hero{
    text-align:center;padding:40px 20px 28px;position:relative;
  }
  .land-hero h1{
    font-size:38px;margin:0 0 10px;letter-spacing:3px;color:var(--accent2);
    /* 像素味描边阴影 */
    text-shadow:3px 3px 0 #1c140d, 6px 6px 0 rgba(0,0,0,.25);
    font-weight:800;
  }
  .land-hero .sub{font-size:15px;color:var(--ink-dim);max-width:560px;margin:0 auto;line-height:1.7}
  .land-hero .pix-rule{
    width:200px;height:8px;margin:20px auto 0;
    background:repeating-linear-gradient(90deg,var(--accent) 0 8px,transparent 8px 16px);
    opacity:.65;image-rendering:pixelated;
  }

  .tier-section{margin:30px 0 8px}
  .tier-section .th{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding-bottom:10px;margin-bottom:16px;border-bottom:1px solid var(--line);
  }
  .tier-section .th .em{font-size:22px}
  .tier-section .th h2{margin:0;font-size:19px;color:var(--ink);letter-spacing:.5px}
  .tier-section .th .cnt{font-size:12px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .tier-section.tier-real .th h2{color:#bfe6c4}
  .tier-section.tier-persona .th h2{color:#dcc9f0}
  .tier-section.tier-celebrity .th h2{color:var(--gold)}
  .fic-note{
    font-size:11px;padding:2px 9px;border-radius:999px;
    background:#5a2e2e;border:1px solid #c76b4a;color:#ffd9c2;font-weight:600;
  }

  .card-grid{
    display:grid;gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  }
  .run-card{
    cursor:pointer;position:relative;overflow:hidden;
    border:1px solid var(--line);border-radius:12px;padding:16px 18px;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    box-shadow:var(--shadow);transition:transform .15s, border-color .15s, box-shadow .15s;
    display:flex;flex-direction:column;gap:8px;
  }
  .run-card::before{
    /* 左侧像素色条 */
    content:"";position:absolute;left:0;top:0;bottom:0;width:5px;
    background:repeating-linear-gradient(180deg,var(--accent) 0 5px,var(--accent2) 5px 10px);
    opacity:.8;
  }
  .run-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 10px 26px rgba(0,0,0,.5)}
  .run-card .rc-title{font-size:16px;font-weight:700;color:var(--accent2);padding-left:8px;line-height:1.4}
  .run-card .rc-sub{font-size:13px;color:var(--ink-dim);padding-left:8px;line-height:1.6;flex:1}
  .run-card .rc-foot{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding-left:8px;margin-top:4px;font-size:11.5px;color:var(--ink-faint);
  }
  .run-card .rc-go{color:var(--accent);font-weight:600}
  .run-card.loading{cursor:progress;opacity:.75}
  .run-card.loading .rc-go::after{content:" · 加载中…"}

  .empty-state{
    border:1px dashed var(--line);border-radius:12px;padding:26px 24px;
    background:rgba(46,66,48,.18);color:var(--ink-dim);font-size:13.5px;line-height:1.8;
  }
  .empty-state .lock{font-size:26px;display:block;margin-bottom:8px;opacity:.7}
  .empty-state code{background:var(--bg2);padding:2px 6px;border-radius:4px;color:#bfe6c4}

  /* landing 也要底部免责，但视图切换时 footer 时间轴要藏 */
  .footer-fixed.landing-mode .timeline-bar{display:none}
  .footer-fixed.landing-mode .disclaimer{border-top:none}

  /* 加载失败提示条（landing 内联） */
  .load-error{
    margin:14px 0;padding:12px 16px;border-radius:10px;
    background:#5a2e2e;border:1px solid #c76b4a;color:#ffd9c2;font-size:13px;
  }
</style>
</head>
<body>
  <!-- 选档案首页（landing） -->
  <div id="landing" class="wrap"></div>

  <!-- 沙盘视图（进入推演时填充） -->
  <div id="app" class="wrap" style="display:none"></div>

  <!-- 底部固定：时间轴 + 免责（两个视图都常驻，landing 只显示免责） -->
  <div class="footer-fixed" id="footer" style="display:none">
    <div class="timeline-bar">
      <div class="tl-head">
        <div class="play-btn" id="playBtn" title="播放 / 暂停">▶</div>
        <div class="tl-day">第 <b id="curDay">0</b> 天 <span class="tl-date" id="curDate"></span></div>
        <div class="finale-btn" id="finaleBtn">看收尾 ✦</div>
      </div>
      <div class="track-area">
        <div class="scrubber" id="scrubber">
          <div class="progress" id="tlProgress"></div>
          <div class="handle" id="tlHandle" style="left:0%"></div>
          <!-- 刻度点由 JS 注入 -->
        </div>
      </div>
    </div>
    <div class="disclaimer" id="disclaimer"></div>
  </div>

  <!-- 模态挂载点 -->
  <div id="modalRoot"></div>

<!-- 公开推演清单（进 git，同步加载）；real-manifest 由脚本惰性注入并静默容错 -->
<script src="runs/manifest.js"></script>
<script>
(function(){
  "use strict";

  // ==================================================================
  // 沙盘引擎：mountSandbox(runData) 把一份推演数据渲染进 #app。
  // 每次调用都是干净的一次挂载（内部状态全部本地化，无跨次残留）。
  // 返回一个 teardown 函数，供切回 landing 时彻底复位。
  // ==================================================================
  function mountSandbox(D){
    const appEl = document.getElementById('app');

    // ============ 0. 容错：数据校验 ============
    function fail(msg, detail){
      appEl.innerHTML =
        '<div class="err-box"><div class="em">🫥</div><h2>'+msg+'</h2><p>'+(detail||'')+'</p></div>';
      const f=document.getElementById('footer'); if(f){ f.classList.add('landing-mode'); }
      throw new Error(msg);
    }
    if(!D || typeof D!=='object') fail('数据没能加载', '这份推演文件的内容读不出来，换一份再试。');
    const meta = D.meta||{};
    const dims = Array.isArray(D.dimensions)&&D.dimensions.length ? D.dimensions : [
      {id:"energy",name:"精力",icon:"⚡"},{id:"money",name:"钱",icon:"💰"},
      {id:"skill",name:"技能",icon:"🛠"},{id:"options",name:"选项数",icon:"🚪"}
    ];
    let timelines = Array.isArray(D.timelines) ? D.timelines.filter(t=>t && typeof t==='object') : [];
    if(!timelines.length) fail('还没有可展示的时间线', '这份推演里的 <code>timelines</code> 是空的，换一份数据再试。');

    const spanDays = (typeof meta.spanDays==='number' && meta.spanDays>0) ? meta.spanDays : 90;
    const startDate = parseDate(meta.startDate) || new Date();

    // SCENES 场景库需要在清洗循环前就绪（用于校验 scene 字段）
    const SCENES = SCENES_DEF();

  // 每条线补默认字段 + 清洗事件
  const LINE_COLORS = ['#e8a45c','#7dc98a','#b58ad6','#f2ca52','#7fb2e8','#e0685f','#5ec9c0','#d98cb0'];
  timelines.forEach((t,i)=>{
    t._i = i;
    t.color = LINE_COLORS[i % LINE_COLORS.length];
    t.id = t.id!=null ? String(t.id) : ('线'+(i+1));
    t.choice = t.choice || ('选项 '+t.id);
    t.baseline = t.baseline || {};
    t.scene = SCENES[t.scene] ? t.scene : 'city';
    t.events = (Array.isArray(t.events)?t.events:[])
      .filter(e=>e && typeof e.day==='number')
      .map(e=>({...e, day:Math.max(0,Math.min(spanDays, Math.round(e.day)))}))
      .sort((a,b)=>a.day-b.day);
    t.finale = t.finale || {};
  });

  const optionC = D.optionC || null;

  // ============ 工具函数 ============
  function parseDate(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d; }
  function fmtDate(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function dateForDay(day){ const d=new Date(startDate); d.setDate(d.getDate()+Math.round(day)); return d; }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  const TYPE_META = {
    '机会':{color:'var(--opp)',raw:'#7dc98a',icon:'🌱'},
    '挫折':{color:'var(--set)',raw:'#e0685f',icon:'⛔'},
    '意外':{color:'var(--acc)',raw:'#f2ca52',icon:'✦'},
    '转折':{color:'var(--piv)',raw:'#b58ad6',icon:'🔀'}
  };
  function typeMeta(t){ return TYPE_META[t] || {color:'var(--ink-dim)',raw:'#c9b394',icon:'●'}; }

  // ============ 状态计算：某线在 day 时刻的 4 维值 ============
  function statsAt(t, day){
    const out = {};
    dims.forEach(dm=>{ out[dm.id] = (typeof t.baseline[dm.id]==='number') ? t.baseline[dm.id] : 5; });
    t.events.forEach(e=>{
      if(e.day<=day && e.effects){
        dims.forEach(dm=>{ if(typeof e.effects[dm.id]==='number') out[dm.id]+=e.effects[dm.id]; });
      }
    });
    dims.forEach(dm=>{ out[dm.id]=clamp(out[dm.id],0,10); });
    return out;
  }

  // ============ 1. 头部渲染 ============
  const TIER_LABEL = {real:'真实自我', persona:'虚拟人设', celebrity:'名人档案'};
  function renderHead(){
    const tier = meta.profileTier || 'persona';
    const tierLbl = TIER_LABEL[tier] || '档案';
    const tags = Array.isArray(meta.tags)?meta.tags:[];
    const tagHtml = tags.map(tg=>{
      const isFic = /虚构|娱乐/.test(tg);
      return '<span class="badge tag'+(isFic?' tag-fic':'')+'">'+(isFic?'🎭 ':'')+esc(tg)+'</span>';
    }).join('');
    return '<header class="head">'+
      '<div class="head-top">'+
        '<h1>'+esc(meta.title||'决策沙盘')+'</h1>'+
        '<span class="badge tier-'+tier+'">'+
          (tier==='celebrity'?'⭐ ':tier==='real'?'🪞 ':'🎭 ')+esc(tierLbl)+
          (meta.profileName?' · '+esc(meta.profileName):'')+
        '</span>'+
        tagHtml+
      '</div>'+
      (meta.decision?'<div class="decision"><span class="lbl">这个决定：</span>'+esc(meta.decision)+'</div>':'')+
      '<div class="head-meta">'+
        '<span>⏳ 跨度 <b>'+spanDays+' 天</b></span>'+
        '<span>📅 起始 <b>'+esc(fmtDate(startDate))+'</b></span>'+
        '<span>🌿 <b>'+timelines.length+'</b> 条平行时间线</span>'+
      '</div>'+
    '</header>';
  }

  // ============ 2. 线选择器 + 世界网格骨架 ============
  const MAX_VISIBLE = 4;
  let selected = timelines.slice(0, MAX_VISIBLE).map(t=>t._i); // 默认选前 4 条

  function renderSelector(){
    if(timelines.length<=MAX_VISIBLE) {
      // 少于等于4条不用选择器，但仍显示 hint
      return '<div class="selector"><span class="hint">'+esc(meta.hint||'2~4 个选项对比效果最佳')+'</span></div>';
    }
    const chips = timelines.map(t=>{
      const on = selected.includes(t._i);
      const full = !on && selected.length>=MAX_VISIBLE;
      return '<div class="chip '+(on?'on':'off')+(full?' disabled':'')+'" data-line="'+t._i+'">'+
        '<span class="dot" style="background:'+t.color+'"></span>'+esc(t.choice)+'</div>';
    }).join('');
    return '<div class="selector">'+chips+
      '<span class="hint">最多同屏 4 条 · '+esc(meta.hint||'2~4 个选项对比效果最佳')+'</span></div>';
  }

  function renderWorldsSkeleton(){
    const vis = selected.map(i=>timelines.find(t=>t._i===i)).filter(Boolean);
    const n = Math.min(vis.length,4);
    let html = '<div class="worlds n'+n+'">';
    vis.forEach(t=>{
      const tm = typeMeta;
      html += '<div class="world" data-line="'+t._i+'">'+
        '<div class="world-hd">'+
          '<div class="choice"><span class="swatch" style="background:'+t.color+'"></span>'+esc(t.choice)+
            (t.isRealHistory?'<span class="hist-badge">史实线</span>':'')+'</div>'+
          (t.subtitle?'<div class="sub">'+esc(t.subtitle)+'</div>':'')+
        '</div>'+
        '<div class="canvas-box">'+
          '<canvas class="world-canvas" width="320" height="200" data-line="'+t._i+'"></canvas>'+
          '<div class="bubble-layer" data-line="'+t._i+'"></div>'+
        '</div>'+
        '<div class="stats" data-line="'+t._i+'">'+
          dims.map(dm=>(
            '<div class="stat-row" data-dim="'+dm.id+'">'+
              '<span class="ic">'+esc(dm.icon)+'</span>'+
              '<span class="nm">'+esc(dm.name)+'</span>'+
              '<span class="bar-track"><span class="bar-fill '+barClass(dm.id)+'"></span></span>'+
              '<span class="val">0</span>'+
            '</div>'
          )).join('')+
        '</div>'+
      '</div>';
    });
    html += '</div>';
    return html;
  }
  function barClass(id){ return id==='energy'?'bar-e':id==='money'?'bar-m':id==='skill'?'bar-s':'bar-o'; }

  // ============ 主渲染 ============
  function renderApp(){
    appEl.innerHTML =
      '<div class="back-btn" id="backBtn"><span class="home">⌂</span> 换个决定</div>' +
      renderHead() + renderSelector() + renderWorldsSkeleton();
    document.getElementById('disclaimer').innerHTML =
      '⚠️ <b>'+esc(meta.disclaimer||'这是可能性的戏剧化演出，不是预测')+'</b>';
    document.getElementById('backBtn').addEventListener('click', ()=>goLanding());
    bindSelector();
    buildCanvases();
    buildTicks();
    updateAll(currentDay, true);
  }

  function bindSelector(){
    document.querySelectorAll('.chip[data-line]').forEach(ch=>{
      ch.addEventListener('click',()=>{
        const i = +ch.dataset.line;
        const idx = selected.indexOf(i);
        if(idx>=0){ if(selected.length>1) selected.splice(idx,1); } // 至少留一条
        else { if(selected.length>=MAX_VISIBLE) return; selected.push(i); }
        selected.sort((a,b)=>a-b);
        // 重渲染选择器 + 世界（保留时间轴/播放状态）
        document.querySelector('.selector').outerHTML = renderSelector();
        document.querySelector('.worlds').outerHTML = renderWorldsSkeleton();
        bindSelector();
        buildCanvases();
        buildTicks();
        updateAll(currentDay, true);
      });
    });
  }

  // ============ 3. 像素世界 canvas ============
  // 场景定义在 SCENES（下方 hoisted）。每条可见线一个 painter。
  const painters = {}; // line._i -> painter
  function buildCanvases(){
    Object.keys(painters).forEach(k=>{ painters[k].alive=false; });
    document.querySelectorAll('canvas.world-canvas').forEach(cv=>{
      const i = +cv.dataset.line;
      const t = timelines.find(x=>x._i===i);
      painters[i] = makePainter(cv, t);
    });
  }

  function makePainter(canvas, t){
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const W = canvas.width, H = canvas.height;
    const state = { alive:true, walkerX:0.3, dir:1, phase:0, t:t };
    return state;
  }

  // 逐帧绘制某条线（progress 0..1 = 时间轴进度）
  function paintWorld(state, progress){
    const t = state.t;
    const scene = SCENES[t.scene] || SCENES.city;
    const canvas = document.querySelector('canvas.world-canvas[data-line="'+t._i+'"]');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const W=canvas.width, H=canvas.height;
    const groundY = Math.round(H*0.72);

    // --- 天空：随进度日夜变化 ---
    drawSky(ctx, W, H, groundY, progress);
    // --- 地面 ---
    ctx.fillStyle = scene.ground;
    ctx.fillRect(0, groundY, W, H-groundY);
    // 地面纹理（像素颗粒）
    ctx.fillStyle = scene.groundDot;
    for(let gx=4; gx<W; gx+=16){
      const gy = groundY + 6 + ((gx*7)%3)*4;
      ctx.fillRect(gx, gy, 4, 4);
    }
    // --- 场景道具 ---
    scene.props.forEach(p=>p(ctx,W,H,groundY,progress));

    // --- 像素小人 走动 + idle 呼吸 ---
    const walkRange = [W*0.12, W*0.7];
    state.walkerX += state.dir*0.7;
    if(state.walkerX>walkRange[1]){state.walkerX=walkRange[1];state.dir=-1;}
    if(state.walkerX<walkRange[0]){state.walkerX=walkRange[0];state.dir=1;}
    state.phase += 0.18;
    drawWalker(ctx, Math.round(state.walkerX), groundY, state.phase, state.dir, t.color);
  }

  function drawSky(ctx,W,H,groundY,p){
    // p: 0=清晨 -> 0.5=正午 -> 1=黄昏/夜
    // 用几段暖色渐变模拟日夜
    let top, bot;
    if(p<0.25){ top=lerpColor([0x3a,0x4a,0x66],[0x9c,0x8f,0x6a],p/0.25); bot=lerpColor([0xd8,0xa8,0x7a],[0xf0,0xd6,0xa0],p/0.25);} // 清晨
    else if(p<0.55){ top=lerpColor([0x9c,0x8f,0x6a],[0x86,0xb8,0xd8],(p-0.25)/0.3); bot=lerpColor([0xf0,0xd6,0xa0],[0xe8,0xdc,0xc0],(p-0.25)/0.3);} // 上午->正午
    else if(p<0.8){ top=lerpColor([0x86,0xb8,0xd8],[0xc8,0x88,0x66],(p-0.55)/0.25); bot=lerpColor([0xe8,0xdc,0xc0],[0xf2,0xb0,0x78],(p-0.55)/0.25);} // 午后->黄昏
    else { top=lerpColor([0xc8,0x88,0x66],[0x2e,0x28,0x40],(p-0.8)/0.2); bot=lerpColor([0xf2,0xb0,0x78],[0x5a,0x40,0x50],(p-0.8)/0.2);} // 黄昏->夜
    const g = ctx.createLinearGradient(0,0,0,groundY);
    g.addColorStop(0, top); g.addColorStop(1, bot);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,groundY);
    // 太阳/月亮 沿弧线移动
    const sunX = W*0.12 + p*W*0.76;
    const sunY = groundY*0.75 - Math.sin(p*Math.PI)*groundY*0.55;
    if(p<0.82){ // 太阳
      ctx.fillStyle = p<0.55?'#fff2c8':'#ffcf8a';
      pxCircle(ctx, Math.round(sunX), Math.round(sunY), 7);
    } else { // 月亮
      ctx.fillStyle='#e8e4d0'; pxCircle(ctx, Math.round(sunX), Math.round(sunY), 6);
      // 星星
      ctx.fillStyle='rgba(255,255,255,.7)';
      for(let s=0;s<6;s++){ ctx.fillRect((s*53+20)%W, 12+((s*29)%30), 2,2); }
    }
    // 云（清晨到午后可见）
    if(p<0.8){
      ctx.fillStyle='rgba(255,255,255,'+(0.5*(1-p))+')';
      pxCloud(ctx, (30 + p*40)%W, 30); pxCloud(ctx, (W*0.55 + p*30)%W, 22);
    }
  }

  // ============ 像素绘制原语 ============
  function pxCircle(ctx,cx,cy,r){
    for(let y=-r;y<=r;y++)for(let x=-r;x<=r;x++){ if(x*x+y*y<=r*r) ctx.fillRect(cx+x,cy+y,1,1); }
  }
  function pxCloud(ctx,x,y){
    x=Math.round(x);y=Math.round(y);
    ctx.fillRect(x,y,20,7); ctx.fillRect(x+5,y-4,12,6); ctx.fillRect(x+2,y+4,22,4);
  }
  function lerpColor(a,b,t){ t=clamp(t,0,1);
    return 'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';
  }
  // 小人：2 帧走 + idle 呼吸
  function drawWalker(ctx,x,groundY,phase,dir,color){
    const y = groundY-16; // 脚在地面
    const moving = true;
    const step = Math.sin(phase);
    const bob = Math.round(Math.abs(Math.sin(phase*2))*1); // 上下起伏 = 走路 / 呼吸
    const legSwing = Math.round(step*2);
    // 身体（用线的颜色做衣服）
    ctx.fillStyle = color;
    ctx.fillRect(x-3, y+2-bob, 6, 7);      // 躯干
    // 头
    ctx.fillStyle = '#f2d5a8';
    ctx.fillRect(x-3, y-4-bob, 6, 6);
    // 头发
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(x-3, y-4-bob, 6, 2);
    // 腿（摆动）
    ctx.fillStyle = '#4a3826';
    ctx.fillRect(x-3+legSwing, y+9-bob, 2, 4);
    ctx.fillRect(x+1-legSwing, y+9-bob, 2, 4);
    // 手臂
    ctx.fillStyle = color;
    ctx.fillRect(x-4-Math.max(0,legSwing), y+3-bob, 2, 5);
    ctx.fillRect(x+3+Math.max(0,-legSwing), y+3-bob, 2, 5);
  }

  // ============ requestAnimationFrame 循环（所有 canvas 同跑）============
  let rafId=null, lastT=0, torndown=false;
  function loop(ts){
    if(torndown) return; // 已切回 landing，停止本实例
    const dt = ts-lastT; lastT=ts;
    // 自动播放推进时间轴
    if(playing){
      const perDay = spanDays/PLAY_SECONDS; // 天/秒
      currentDay += perDay*(dt/1000);
      if(currentDay>=spanDays){ currentDay=spanDays; setPlaying(false); onReachEnd(); }
      updateAll(currentDay,false);
    }
    const prog = spanDays>0 ? clamp(currentDay/spanDays,0,1) : 0;
    Object.values(painters).forEach(st=>{ if(st.alive) paintWorld(st, prog); });
    rafId = requestAnimationFrame(loop);
  }

  // ============ 4./5./7. 时间轴 + 状态 + 气泡刻度 ============
  let currentDay = 0;
  let playing = false;
  const PLAY_SECONDS = 75; // 全程约 75 秒
  const shownBubbles = {}; // key=line_event -> el (避免重复)

  function buildTicks(){
    const scrub = document.getElementById('scrubber');
    // 清掉旧刻度
    scrub.querySelectorAll('.tick').forEach(n=>n.remove());
    selected.map(i=>timelines.find(t=>t._i===i)).filter(Boolean).forEach(t=>{
      t.events.forEach((e,ei)=>{
        const tick = document.createElement('div');
        tick.className='tick';
        tick.style.left = (spanDays>0? (e.day/spanDays*100):0)+'%';
        tick.style.background = t.color;
        tick.title = t.choice+' · '+e.title+'（第'+e.day+'天）';
        tick.addEventListener('click',(ev)=>{ ev.stopPropagation(); openEvent(t,e); });
        scrub.appendChild(tick);
      });
    });
  }

  function updateAll(day, force){
    // 时间轴 UI
    const prog = spanDays>0? clamp(day/spanDays,0,1):0;
    document.getElementById('tlProgress').style.width = (prog*100)+'%';
    document.getElementById('tlHandle').style.left = (prog*100)+'%';
    document.getElementById('curDay').textContent = Math.round(day);
    document.getElementById('curDate').textContent = fmtDate(dateForDay(day));

    // 每条可见线：状态条 + 气泡
    selected.map(i=>timelines.find(t=>t._i===i)).filter(Boolean).forEach(t=>{
      updateStats(t, day, force);
      updateBubbles(t, day);
    });
  }

  function updateStats(t, day, force){
    const box = document.querySelector('.stats[data-line="'+t._i+'"]');
    if(!box) return;
    const s = statsAt(t, day);
    dims.forEach(dm=>{
      const row = box.querySelector('.stat-row[data-dim="'+dm.id+'"]');
      if(!row) return;
      const v = s[dm.id];
      const fill = row.querySelector('.bar-fill');
      const val = row.querySelector('.val');
      fill.style.width = (v/10*100)+'%';
      const prev = +val.dataset.v || (typeof t.baseline[dm.id]==='number'?t.baseline[dm.id]:5);
      val.textContent = v.toFixed(v%1?1:0);
      // 变化方向短动画
      if(!force && Math.abs(v-prev)>0.01){
        val.classList.remove('up','down');
        void val.offsetWidth;
        val.classList.add(v>prev?'up':'down');
        setTimeout(()=>val.classList.remove('up','down'),600);
      }
      val.dataset.v = v;
    });
  }

  function updateBubbles(t, day){
    const layer = document.querySelector('.bubble-layer[data-line="'+t._i+'"]');
    if(!layer) return;
    const canvas = document.querySelector('canvas.world-canvas[data-line="'+t._i+'"]');
    t.events.forEach((e,ei)=>{
      const key = t._i+'_'+ei;
      const active = e.day<=day && e.day>day-BUBBLE_WINDOW; // 事件发生后一段时间内可见
      const exists = shownBubbles[key];
      if(active && !exists){
        const tm = typeMeta(e.type);
        const b = document.createElement('div');
        b.className='bubble';
        b.style.borderColor = tm.raw;
        b.style.color = '#2b2018';
        // 位置：canvas 上方随机偏移，避开边缘
        const px = 20 + (ei*37)%60;   // 12%~..
        const leftPct = clamp(18 + (ei*23)%55, 12, 82);
        b.style.left = leftPct+'%';
        b.style.top = (30 + (ei%3)*22)+'%';
        b.innerHTML = tm.icon+' '+esc(e.title);
        b.addEventListener('click',()=>openEvent(t,e));
        layer.appendChild(b);
        shownBubbles[key]=b;
      } else if(!active && exists){
        exists.remove(); delete shownBubbles[key];
      }
    });
  }
  const BUBBLE_WINDOW = Math.max(3, spanDays*0.12); // 气泡停留天数窗口

  // ============ 6. 推演卡模态 ============
  function openEvent(t, e){
    const tm = typeMeta(e.type);
    const effHtml = e.effects ? dims.map(dm=>{
      const v = e.effects[dm.id];
      if(typeof v!=='number' || v===0) return '';
      return '<span class="eff '+(v>0?'pos':'neg')+'">'+esc(dm.icon)+' '+esc(dm.name)+
        ' <span class="d">'+(v>0?'+':'')+v+'</span></span>';
    }).join('') : '';
    const dateStr = e.date || fmtDate(dateForDay(e.day));
    const html =
      '<div class="overlay" id="ovl">'+
        '<div class="modal" role="dialog">'+
          '<div class="modal-hd">'+
            '<div class="modal-close" id="mClose">✕</div>'+
            '<span class="type-tag" style="background:'+tm.raw+'">'+tm.icon+' '+esc(e.type||'事件')+'</span>'+
            '<span class="badge" style="margin-left:8px;border-color:'+t.color+';color:'+t.color+'">'+esc(t.choice)+'</span>'+
            '<h2>'+esc(e.title||'一个事件')+'</h2>'+
            '<div class="mdate">📅 第 '+e.day+' 天 · '+esc(dateStr)+'</div>'+
          '</div>'+
          '<div class="modal-bd">'+
            (e.summary?'<div class="summary">'+esc(e.summary)+'</div>':'')+
            (e.reasoning?'<div class="block"><div class="bt">🧭 为什么会发生</div><div class="bc">'+esc(e.reasoning)+'</div></div>':'')+
            (effHtml?'<div class="block"><div class="bt">📊 对四维的影响</div><div class="effects">'+effHtml+'</div></div>':'')+
            (e.realityCheck?'<div class="block reality"><div class="bt">🪞 史实对照</div><div class="bc">'+esc(e.realityCheck)+'</div></div>':'')+
          '</div>'+

  // 收集本实例挂在持久 DOM / window 上的监听，teardown 时逐个摘除，避免多次进出叠加
  const listeners = [];
  function on(target, type, fn, opts){ target.addEventListener(type, fn, opts); listeners.push([target,type,fn,opts]); }

  function bindTimeline(){
    on(document.getElementById('playBtn'),'click',()=>{
      if(!playing && currentDay>=spanDays){ currentDay=0; finaleAutoShown=false; resetBubbles(); }
      setPlaying(!playing);
    });
    on(document.getElementById('finaleBtn'),'click',()=>{ setPlaying(false); openFinale(); });

    const scrub = document.getElementById('scrubber');
    let dragging=false;
    function setFromClientX(clientX){
      const r = scrub.getBoundingClientRect();
      const p = clamp((clientX-r.left)/r.width,0,1);
      currentDay = p*spanDays;
      if(currentDay<spanDays) finaleAutoShown=false;
      updateAll(currentDay,false);
    }
    on(scrub,'mousedown',e=>{ dragging=true; setPlaying(false); setFromClientX(e.clientX); });
    on(window,'mousemove',e=>{ if(dragging) setFromClientX(e.clientX); });
    on(window,'mouseup',()=>{ dragging=false; });
    // 触摸
    on(scrub,'touchstart',e=>{ dragging=true; setPlaying(false); setFromClientX(e.touches[0].clientX); },{passive:true});
    on(window,'touchmove',e=>{ if(dragging&&e.touches[0]) setFromClientX(e.touches[0].clientX); },{passive:true});
    on(window,'touchend',()=>{ dragging=false; });
  }

  // 引擎内用到的纯函数（无需实例状态），提到外层供 mountSandbox 与 landing 共用
  function parseDate(s){ if(!s) return null; const d=new Date(s); return isNaN(d)?null:d; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  // ==================================================================
  //  路由 / 运行库加载 / Landing 首页
  // ==================================================================
  const TIER_ORDER = ['real','persona','celebrity'];
  const TIER_INFO = {
    real:     { key:'real',     em:'🔒', label:'真实自我' },
    persona:  { key:'persona',  em:'🎭', label:'虚拟人设' },
    celebrity:{ key:'celebrity',em:'🌟', label:'名人档案' }
  };

  const landingEl = document.getElementById('landing');
  const appEl = document.getElementById('app');
  const footerEl = document.getElementById('footer');
  let activeTeardown = null;   // 当前沙盘实例的 teardown
  let loadingRunId = null;     // 正在惰性加载的 run id（防重复点击）
  const loadedRunFiles = {};   // file -> Promise（避免重复注入同一个文件）

  // ---- 动态注入 script（相对路径，file:// 可用；禁 fetch）----
  function injectScript(src){
    if(loadedRunFiles[src]) return loadedRunFiles[src];
    const p = new Promise((resolve,reject)=>{
      const s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.onload = ()=>resolve(true);
      s.onerror = ()=>reject(new Error('load-failed:'+src));
      document.head.appendChild(s);
    });
    loadedRunFiles[src] = p;
    return p;
  }

  // ---- 读取清单（manifest 已在页面头部同步加载；real-manifest 静默容错）----
  function getLibraryRuns(){
    const lib = window.SANDBOX_LIBRARY;
    if(!lib || !Array.isArray(lib.runs)) return [];
    // 去重（同 id 只留第一条），并只保留有 id + file 的合法条目
    const seen = {};
    return lib.runs.filter(r=>{
      if(!r || !r.id || !r.file) return false;
      if(seen[r.id]) return false;
      seen[r.id]=true; return true;
    });
  }

  // ---- Landing 渲染 ----
  function renderLanding(errMsg){
    const runs = getLibraryRuns();
    const byTier = { real:[], persona:[], celebrity:[] };

      const tier = TIER_INFO[r.tier] ? r.tier : 'persona';
      byTier[tier].push(r);
    });

    let html =
      '<div class="landing">'+
        '<div class="land-hero">'+
          '<h1>另一个你</h1>'+
          '<div class="sub">把一个真实的决定，交给几个平行的「你」各走一段日子。挑一份档案，看看那条没走的路。</div>'+
          '<div class="pix-rule"></div>'+
        '</div>';

    if(errMsg){
      html += '<div class="load-error">😕 '+esc(errMsg)+'</div>';
    }

    TIER_ORDER.forEach(tier=>{

      const list = byTier[tier];
      html += '<section class="tier-section tier-'+tier+'">'+
        '<div class="th">'+

          (tier==='celebrity'?'<span class="fic-note">虚构推演 · 娱乐向</span>':'')+

      if(!list.length){
        if(tier==='real'){
          html += '<div class="empty-state"><span class="lock">🔒</span>'+
            '你的真实推演只存在你自己的电脑上，这个公开页面永远看不到它。生成方法见仓库 <code>README</code>。</div>';
        }else{
          html += '<div class="empty-state">这一档暂时还没有推演。</div>';
        }
      }else{
        html += '<div class="card-grid">';
        list.forEach(r=>{
          html += '<div class="run-card" data-run="'+esc(r.id)+'">'+
            '<div class="rc-title">'+esc(r.title||r.id)+'</div>'+
            (r.subtitle?'<div class="rc-sub">'+esc(r.subtitle)+'</div>':'<div class="rc-sub"></div>')+
            '<div class="rc-foot">'+
              '<span>'+(r.generatedAt?'🗓 '+esc(r.generatedAt):'')+'</span>'+
              '<span class="rc-go">进入 →</span>'+

        });
        html += '</div>';

      html += '</section>';

    html += '</div>';
    landingEl.innerHTML = html;

    // 绑定卡片点击
    landingEl.querySelectorAll('.run-card[data-run]').forEach(card=>{
      card.addEventListener('click', ()=>{
        if(loadingRunId) return;

      });

  // ---- 切到 landing 视图 ----
  function goLanding(){
    if(activeTeardown){ try{ activeTeardown(); }catch(e){} activeTeardown=null; }
    appEl.style.display='none';
    landingEl.style.display='block';
    footerEl.style.display='block';
    footerEl.classList.add('landing-mode'); // 只显示免责，藏时间轴
    // 免责在 landing 也常驻
    document.getElementById('disclaimer').innerHTML =
      '⚠️ <b>这是可能性的戏剧化演出，不是预测</b>';
    // 清 hash（回 landing）
    if(location.hash){ history.replaceState(null,'', location.pathname+location.search); }
    renderLanding();
    window.scrollTo(0,0);
  }

  // ---- 进入某份推演（惰性加载 → 挂载沙盘）----
  function enterRun(runId, cardEl){
    const runs = getLibraryRuns();
    const entry = runs.find(r=>r.id===runId);
    if(!entry){ renderLanding('没找到这份推演（'+esc(runId)+'），可能清单已经更新，刷新一下再试。'); return; }

    loadingRunId = runId;
    if(cardEl) cardEl.classList.add('loading');

    const done = ()=>{ loadingRunId=null; if(cardEl) cardEl.classList.remove('loading'); };

    // 数据可能已经加载过（返回后再进）
    function mountFromRegistry(){
      const data = (window.SANDBOX_RUNS||{})[runId];
      if(!data){
        done();
        renderLanding('这份推演的数据文件加载了，但没能读到内容（'+esc(runId)+'）。');
        return;
      }
      // 若已有沙盘在挂，先拆掉
      if(activeTeardown){ try{ activeTeardown(); }catch(e){} activeTeardown=null; }
      landingEl.style.display='none';
      appEl.style.display='block';
      // 写 hash（深链）
      if(location.hash!=='#run='+runId){
        history.replaceState(null,'', location.pathname+location.search+'#run='+runId);
      }
      try{
        activeTeardown = mountSandbox(data);
      }catch(err){
        console.error(err);
        // mountSandbox 内部已把错误占位画进 #app，这里只需保证视图切过去
      }
      done();
      window.scrollTo(0,0);
    }

    if((window.SANDBOX_RUNS||{})[runId]){ mountFromRegistry(); return; }

    injectScript(entry.file).then(mountFromRegistry).catch(()=>{
      done();
      // 加载失败：友好中文错误，留在 landing
      renderLanding('这份推演的数据文件没能加载（'+esc(entry.file)+'）。'+
        '如果是在本地直接打开的，确认这个文件确实存在；也可能是文件还没生成。');
    });
  }

  // ---- 深链：#run=<id> ----
  function currentHashRun(){
    const m = /#run=([^&]+)/.exec(location.hash||'');
    return m ? decodeURIComponent(m[1]) : null;
  }

  // ---- 加载 real-manifest（静默容错），完成后再决定初始视图 ----
  function boot(){
    // real-manifest 极大概率不存在（公开站 404），onerror 静默跳过
    injectScript('runs/real-manifest.js').catch(()=>{ /* 静默：本机才有 */ })
      .then(()=>{
        const deep = currentHashRun();
        if(deep && getLibraryRuns().some(r=>r.id===deep)){
          // 先把 landing 底子铺好（返回时有内容），再直接进沙盘
          renderLanding();
          enterRun(deep, null);
        }else{
          goLanding();
        }
      });
    // 支持前进/后退键改 hash
    window.addEventListener('hashchange', ()=>{
      const deep = currentHashRun();
      if(!deep){ if(appEl.style.display!=='none') goLanding(); return; }
      if(loadingRunId===deep) return;
      // 当前不在这个 run 上才切
      enterRun(deep, null);
    });
  }

  boot();

})();
</script>
</body>
</html>
